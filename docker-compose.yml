
services:
  db:
    image: postgres:15
    container_name: pawcloud_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: pawcloud
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: pawcloud_backend
    ports:
      - "5000:5000"
    depends_on:
      - db
    env_file:
      - .env

  frontend:
    build: ./frontend
    container_name: pawcloud_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata: