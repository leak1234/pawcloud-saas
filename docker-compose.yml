services:
  db:
    image: postgres:15
    container_name: pawcloud_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: pawcloud
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: pawcloud_backend
    ports:
      - "5000:5000"
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      - ./backend:/app
    environment:
      - PYTHONPATH=/app

  evolution_api:
    image: atendai/evolution-api:v1.8.2
    container_name: pawcloud_evolution
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=PawCloudGlobalKey123
      - DATABASE_PROVIDER=sqlite
    volumes:
      - ./evolution_data:/evolution/instances

  frontend:
    build: ./frontend
    container_name: pawcloud_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata: